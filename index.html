<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Guess Whoo - Football</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header class="app-header">
      <div class="title">FOOTBALL GUESS GAME</div>
      <p class="subtitle">Guess the player or guess the word</p>
      <div class="mode-toggle">
        <button id="mode-players" class="mode-btn active">Guess the Player</button>
        <button id="mode-word" class="mode-btn">Guess the Word</button>
      </div>
    </header>

    <div class="layout" id="main-layout">
      <section class="panel" id="panel-players">
        <div class="panel-header">
          <div class="panel-title">Players Board</div>
          <div class="round-select">
            <label for="round-select">Round</label>
            <select id="round-select"></select>
          </div>
        </div>
        <div id="players-grid" class="grid"></div>
      </section>

      <section class="panel" id="side-panel">
        <div class="secret-box" id="secret-box"></div>
        <div class="controls">
          <button id="btn-reveal" class="btn primary">Reveal on grid</button>
          <button id="btn-clear-secret" class="btn">Clear secret</button>
          <button id="btn-new-round" class="btn">Next round</button>
          <span class="pill">
            <span class="pill-dot"></span>
            <span>Tap cards to hide and choose secret</span>
          </span>
        </div>

        <div id="panel-word" class="word-panel-body" style="display: none; margin-top: 16px;">
          <div class="panel-header" style="margin-bottom: 6px;">
            <div class="panel-title">Guess the Word</div>
          </div>
          <div class="word-row">
            <div id="word-display" class="word-display">_ _ _ _</div>
            <div class="word-category" id="word-category">Category</div>
          </div>
          <div class="word-input-row">
            <input id="word-input" type="text" maxlength="1" autocomplete="off" />
            <button id="btn-word-guess" class="btn primary">Guess</button>
            <button id="btn-word-next" class="btn">Next word</button>
          </div>
          <div class="status-row">
            Attempts left: <span id="word-attempts">6</span> · Used: <span id="word-used">—</span>
          </div>
        </div>
      </section>
    </div>

    <div id="home-screen" class="home-screen">
      <div class="home-inner">
        <h2 class="home-title">Football Guess Game</h2>
        <p class="home-subtitle">Choose how you want to play.</p>
        <div class="home-buttons">
          <button id="home-players" class="home-btn primary">Guess the Player</button>
          <button id="home-word" class="home-btn">Guess the Word</button>
        </div>
      </div>
    </div>
  </div>

  <script src="players.js"></script>
  <script src="rounds.js"></script>
  <script src="words.js"></script>
  <script src="script.js"></script>
</body>
</html>
