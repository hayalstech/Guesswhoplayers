<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guess Whoo - Football Player Guessing Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <script>console.log('HTML body start');</script>
    <div class="game-wrapper">
        <!-- Header -->
        <header class="game-header">
            <div class="logo">
                <span class="logo-icon">🦉</span>
                <h1>Guess Whoo</h1>
            </div>
            <p class="tagline">The Ultimate Football Guessing Game</p>
        </header>

        <!-- Game Mode Selection -->
        <section id="mode-selection" class="mode-selection">
            <h2>Choose Your Game Mode</h2>
            <div class="mode-buttons">
                <button class="mode-btn player-mode" data-mode="player">
                    <span class="mode-icon">⚽</span>
                    <span class="mode-label">Guess The Player</span>
                    <span class="mode-desc">30 players • 30 rounds • Find the secret player</span>
                </button>
                <button class="mode-btn word-mode" data-mode="word">
                    <span class="mode-icon">🔤</span>
                    <span class="mode-label">Guess The Word</span>
                    <span class="mode-desc">Football words • Letter guessing • 6 attempts</span>
                </button>
            </div>
        </section>

        <!-- Game Content -->
        <main id="game-content" class="game-content hidden">
            <!-- Back Button -->
            <button id="back-btn" class="back-btn">← Back to Menu</button>

            <!-- Game Title -->
            <div class="game-title-section">
                <h2 id="game-title">Guess The Football Player</h2>
                <p id="game-instruction">Click cards to flip them and find the secret player!</p>
            </div>

            <!-- Round Selector -->
            <section class="round-section">
                <h3>Select Round</h3>
                <div class="round-buttons" id="round-buttons">
                    <!-- Round buttons generated by JavaScript -->
                </div>
            </section>

            <!-- Secret Player Display -->
            <section id="secret-player" class="secret-player">
                <div class="secret-card">
                    <span class="secret-label">SECRET PLAYER</span>
                    <div id="secret-info" class="secret-info">
                        <span class="hidden-text">???</span>
                    </div>
                </div>
                <button id="reveal-btn" class="reveal-btn">👁 Reveal Secret</button>
            </section>

            <!-- Player Grid (6x5 = 30 cards) -->
            <section id="player-board" class="player-board">
                <div class="players-grid" id="players-grid">
                    <!-- 30 player cards generated by JavaScript -->
                </div>
            </section>

            <!-- Word Game Section -->
            <section id="word-board" class="word-board hidden">
                <div class="word-display-container">
                    <span class="word-label">HIDDEN WORD</span>
                    <div id="word-display" class="word-display">_ _ _ _ _</div>
                    <div id="word-category" class="word-category">Category: ???</div>
                </div>
                <div class="word-status">
                    <div class="attempts">Attempts: <span id="attempts-left">6</span>/6</div>
                    <div class="letters-used">Used: <span id="used-letters">-</span></div>
                </div>
                <div class="word-input">
                    <input type="text" id="letter-input" maxlength="1" placeholder="Enter a letter">
                    <button id="guess-btn" class="guess-btn">Guess</button>
                </div>
            </section>

            <!-- Controls -->
            <section class="controls">
                <button id="new-game-btn" class="control-btn">🎮 New Game</button>
                <button id="hide-all-btn" class="control-btn">🙈 Hide All</button>
                <button id="show-all-btn" class="control-btn">👁 Show All</button>
                <button id="pick-secret-btn" class="control-btn">🎯 Pick Secret</button>
            </section>
        </main>

        <!-- Footer -->
        <footer class="game-footer">
            <p>Built with ⚽ for football fans</p>
        </footer>
    </div>

    <script src="all.js?v=3"></script>
</body>
</html>
